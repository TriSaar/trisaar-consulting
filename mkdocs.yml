site_name: TriSaar Consulting
site_description: Analytics, Automation & AI Consulting
site_author: TriSaar
site_url: https://trisaarconsulting.github.io

theme:
  name: material
  language: en

  palette:
    - scheme: default
      primary: blue grey
      accent: teal

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md

extra_css:
  - assets/css/variables.css
  - assets/css/base.css
  - assets/css/components.css
  - assets/css/homepage.css
  - assets/css/utilities.css

extra_javascript:
  - assets/js/main.js